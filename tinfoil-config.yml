      - LITERATURE_RERANK_PROVIDER: "openrouter-rerank"
      - LITERATURE_AGENT_RETRIEVAL_PROFILE: "default"
      - LITERATURE_HYDE_ENABLED: "true"
      - LITERATURE_LITQA_RECALL_MAX_QUERIES: "16"
