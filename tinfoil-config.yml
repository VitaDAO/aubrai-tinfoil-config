# Tinfoil Container Configuration — Aubrai
#
# PUBLIC REPO — this file is the attestation anchor.
# Users verify the running enclave against the SHA256 digest pinned below.
#
# DEPLOY:
#   Push a version tag (e.g. v1.0.0) to trigger the build workflow.
#   The workflow pins the image digest here and creates a signed pre-release.
#   Tinfoil detects the new tag and deploys automatically.

cvm-version: 0.7.5
cpus: 2  # I/O-bound workload; load test peak ~1.2 cores of 4. Testing 2.
memory: 16384  # 16GB test with slim deps (image shrunk ~2.25GB->~1.8GB, may now fit the ~2GB RAM-disk)

containers:
  - name: aubrai
    # Image digest is pinned by CI (tinfoil-build.yml).
    # DO NOT edit this line manually — updated automatically on each deploy.
    image: "ghcr.io/vitadao/aubrai-server:tinfoil-v2026.07.08.0750-citfix@sha256:6d95122310e2b2d3b99b35e50610a8b563e5ba294512c09e3f1fa112872a5f3e"
    registry:
      username: DobrinAlexandru
      password_secret: GHCR_TOKEN
    env:
      # Non-sensitive config — safe to commit
      - NODE_ENV: "production"
      - PORT: "3000"
      - API_PORT: "3000"
      - AUBRAI_PUBLIC_URL: "https://aubrai-server-prod.vitality-now.containers.tinfoil.dev"
      - SERVE_CLIENT_OUT: "false"
      - AUTH_MODE: "jwt"
      - DB_BACKEND: "supabase"
      - ALLOWED_ORIGINS: "https://staging.aubr.ai,https://chat.aubr.ai"
      - SENTRY_ENVIRONMENT: "production"
      - SENTRY_RELEASE: "v2026.06.09.1108"
      - SENTRY_TRACES_SAMPLE_RATE: "0.05"
      - SENTRY_SMOKE_ENABLED: "true"
      - USE_JOB_QUEUE: "true"
      - REDIS_URL: "redis://localhost:6379"
      - LITERATURE_AGENT_URL: "http://localhost:8000"
      - LITERATURE_AGENT_FAST_TIMEOUT_MS: "420000"
      - LITERATURE_AGENT_STATUS_POLL_TIMEOUT_SECONDS: "5"
      - CORPUS_RUNTIME_INGEST_ENABLED: "true"
      - CORPUS_RUNTIME_INGEST_MAX_REFERENCES: "3"
      - CORPUS_RUNTIME_INGEST_MAX_PAGES: "0"
      - CORPUS_RUNTIME_INGEST_MAX_FIGS: "0"
      - CORPUS_RUNTIME_INGEST_MAX_TABLES: "0"
      - CORPUS_DEMAND_ENABLED: "1"
      - CORPUS_DIAGNOSTIC_ENABLED: "true"
      - SENTRY_DSN: "https://929bbce961b77486a72a2528448b9d7f@o4511338800021504.ingest.de.sentry.io/4511393586217040"
      - CHARACTER_FILE: "characters/aubrai.json"
      - DATA_DIR: "/tmp/aubrai-data"
      # Private embeddings via Tinfoil (768-dim nomic-embed-text, HPKE-encrypted)
      - EMBEDDING_PROVIDER: "tinfoil"
      - TEXT_EMBEDDING_MODEL: "nomic-embed-text"
      - DEEP_RESEARCH_SESSION_MAX_DURATION_MS: "14400000"
      - DEEP_RESEARCH_CHECKPOINT_ENABLED: "true"
      # Disable LLM fallback — no data leaves to Anthropic/Google on Tinfoil failure
      # Fast chat is standard/non-private. Private and deep roles stay on Tinfoil.
      - FAST_CHAT_LLM_PROVIDER: "cerebras"
      - EXA_ENABLED: "true"
      - FAST_CHAT_LLM_MODEL: "gemma-4-31b"
      - FAST_CHAT_HYDE_PROVIDER: "cerebras"
      - FAST_CHAT_HYDE_MODEL: "gemma-4-31b"
      - FAST_CHAT_QUERY_REFORMULATE_PROVIDER: "cerebras"
      - FAST_CHAT_QUERY_REFORMULATE_MODEL: "gemma-4-31b"
      - FAST_CHAT_RERANK_PROVIDER: "cerebras"
      - FAST_CHAT_RERANK_MODEL: "gemma-4-31b"
      - LITERATURE_FAST_SOURCES: "pubmed,europepmc,pmc,biorxiv,medrxiv,crossref"
      - ORCHESTRATOR_LLM_PROVIDER: "openai"
      - ORCHESTRATOR_LLM_MODEL: "gpt-5.5"
      - REPLY_LLM_PROVIDER: "openai"
      - REPLY_LLM_MODEL: "gpt-5.5"
      - HYPOTHESIS_LLM_PROVIDER: "openai"
      - HYPOTHESIS_LLM_MODEL: "gpt-5.5"
      - PLANNING_LLM_PROVIDER: "openai"
      - PLANNING_LLM_MODEL: "gpt-5.5"
      - SUBAGENT_LLM_PROVIDER: "openai"
      - SUBAGENT_LLM_MODEL: "gpt-5.5"
      - DEEP_RESEARCH_ORCHESTRATOR_PROVIDER: "openai"
      - DEEP_RESEARCH_ORCHESTRATOR_MODEL: "gpt-5.5"
      - REFLECTION_LLM_PROVIDER: "openai"
      - REFLECTION_LLM_MODEL: "gpt-5.5"
      - DISCOVERY_LLM_PROVIDER: "openai"
      - DISCOVERY_LLM_MODEL: "gpt-5.5"
      - SEARXNG_URL: "https://aubrai-searxng-production.up.railway.app"
      # bioagent_v2 private-mode routes. Standard mode can continue to use
      # AUBRAI_SUPABASE_*; private routes write encrypted payloads to
      # AUBRAI_PRIVACY_SUPABASE_*.
      # Private chat now routed to the same attested Tinfoil TEE (vita-tinfoil-model
      # / qwen-opus) as private research — both give the same encrypt-to-enclave
      # guarantee; RedPill/Phala's E2EE adapter is only needed for tool-less paths
      # that want its extra client-side message-content sealing, which chat no
      # longer uses.
      - PRIVATE_CHAT_LLM_PROVIDER: "vita-tinfoil-model"
      - PRIVATE_CHAT_LLM_MODEL: "qwen-opus"
      - PRIVATE_RESEARCH_LLM_PROVIDER: "vita-tinfoil-model"
      - PRIVATE_RESEARCH_LLM_MODEL: "qwen-opus"
      - PRIVATE_HELPER_LLM_PROVIDER: "cerebras"
      - PRIVATE_HELPER_LLM_MODEL: "gemma-4-31b"
      - PRIVATE_LITERATURE_ENABLED: "true"
      - PRIVATE_MODE_ALLOW_EXTERNAL_TOOLS: "false"
      - PRIVATE_MODE_REQUIRE_ENCRYPTED_STORAGE: "true"
      # HPKE public key — attestation anchor so vita app can encrypt to this enclave
      - HPKE_PUBLIC_KEY: "pBbUKMAOC20RbFqfbqNcmqUwb8TGUbpxw4jS4OOj+QY="

    secrets:
      - JINA_API_KEY
      # All values below are encrypted — only decryptable inside the enclave.
      # Add each in the Tinfoil Dashboard > Secrets before first deploy.

      # GHCR registry credentials
      - GHCR_TOKEN

      # Tinfoil inference
      - TINFOIL_API_KEY
      - SAMBANOVA_API_KEY
      - CEREBRAS_API_KEY
      - EXA_API_KEY
      - GOOGLE_API_KEY
      - OPENAI_API_KEY

      # Encryption master key (XChaCha20-Poly1305 for DB/file encryption)
      - ENCRYPTION_MASTER_KEY     # openssl rand -hex 32

      # Auth
      - BIOAGENTS_SECRET          # JWT signing key: openssl rand -hex 32
      - AUBRAI_PRIVY_APP_ID       # Public Privy app id, exposed to Next as NEXT_PUBLIC_PRIVY_APP_ID

      # Database
      - AUBRAI_SUPABASE_URL
      - AUBRAI_SUPABASE_ANON_KEY
      - AUBRAI_SUPABASE_SERVICE_KEY
      - SUPABASE_FULL_URL
      - SUPABASE_DB_URL
      - DATABASE_URL
      - AUBRAI_SUPABASE_DB_URL
      - SUPABASE_JWT_SECRET
      - AUBRAI_PRIVACY_SUPABASE_URL
      - AUBRAI_PRIVACY_SUPABASE_SERVICE_KEY

      # File storage

      # HPKE key pair — private is sealed, public is the attestation anchor
      - HPKE_PRIVATE_KEY
      - HPKE_PUBLIC_KEY

      # Literature & analysis agents
      - OPENSCHOLAR_API_URL
      - OPENSCHOLAR_API_KEY
      - BIO_LIT_AGENT_API_URL
      - LITERATURE_AGENT_API_KEY
      - BIO_LIT_AGENT_API_KEY
      - DATA_ANALYSIS_API_URL
      - DATA_ANALYSIS_API_KEY
      - AUBRAI_SENTRY_DSN
      - NVIDIA_API_KEY
      - ZILLIZ_URI
      - ZILLIZ_TOKEN

  - name: worker
    image: "ghcr.io/vitadao/aubrai-server:tinfoil-v2026.07.08.0750-citfix@sha256:6d95122310e2b2d3b99b35e50610a8b563e5ba294512c09e3f1fa112872a5f3e"
    registry:
      username: DobrinAlexandru
      password_secret: GHCR_TOKEN
    command: ["bun", "dist/worker.js"]

    env:
      - NODE_ENV: "production"
      - CORPUS_GROWER_ENABLED: "true"
      - CORPUS_GROWER_INTERVAL_CRON: "*/12 * * * *"
      - CORPUS_GROWER_MAX_PER_CYCLE: "10"
      - CORPUS_GROWER_MODE: "gap"
      - CORPUS_GROWER_COVERAGE_TARGET: "8"
      - CORPUS_GROWER_COVERAGE_MIN_SCORE: "0.35"
      - CORPUS_GROWER_FRONTIER_ENABLED: "1"
      - CORPUS_DEMAND_ENABLED: "1"
      - CORPUS_DEMAND_MAX_TOPICS: "200"
      - CORPUS_RUNTIME_INGEST_ENABLED: "true"
      - CORPUS_RUNTIME_INGEST_MAX_REFERENCES: "10"
      - PORT: "3000"
      - API_PORT: "3000"
      - SERVE_CLIENT_OUT: "false"
      - AUTH_MODE: "jwt"
      - DB_BACKEND: "supabase"
      - ALLOWED_ORIGINS: "https://staging.aubr.ai,https://chat.aubr.ai"
      - SENTRY_ENVIRONMENT: "production"
      - SENTRY_RELEASE: "v2026.06.09.1108"
      - SENTRY_TRACES_SAMPLE_RATE: "0.05"
      - USE_JOB_QUEUE: "true"
      - REDIS_URL: "redis://localhost:6379"
      - LITERATURE_AGENT_URL: "http://localhost:8000"
      - LITERATURE_AGENT_FAST_TIMEOUT_MS: "420000"
      - LITERATURE_AGENT_STATUS_POLL_TIMEOUT_SECONDS: "5"
      - SENTRY_DSN: "https://929bbce961b77486a72a2528448b9d7f@o4511338800021504.ingest.de.sentry.io/4511393586217040"
      - CHARACTER_FILE: "characters/aubrai.json"
      - DATA_DIR: "/tmp/aubrai-data"
      - EMBEDDING_PROVIDER: "tinfoil"
      - TEXT_EMBEDDING_MODEL: "nomic-embed-text"
      - DEEP_RESEARCH_SESSION_MAX_DURATION_MS: "14400000"
      - DEEP_RESEARCH_CHECKPOINT_ENABLED: "true"
      - FAST_CHAT_LLM_PROVIDER: "cerebras"
      - EXA_ENABLED: "true"
      - FAST_CHAT_LLM_MODEL: "gemma-4-31b"
      - FAST_CHAT_HYDE_PROVIDER: "cerebras"
      - FAST_CHAT_HYDE_MODEL: "gemma-4-31b"
      - FAST_CHAT_QUERY_REFORMULATE_PROVIDER: "cerebras"
      - FAST_CHAT_QUERY_REFORMULATE_MODEL: "gemma-4-31b"
      - FAST_CHAT_RERANK_PROVIDER: "cerebras"
      - FAST_CHAT_RERANK_MODEL: "gemma-4-31b"
      - LITERATURE_FAST_SOURCES: "pubmed,europepmc,pmc,biorxiv,medrxiv,crossref"
      - ORCHESTRATOR_LLM_PROVIDER: "openai"
      - ORCHESTRATOR_LLM_MODEL: "gpt-5.5"
      - REPLY_LLM_PROVIDER: "openai"
      - REPLY_LLM_MODEL: "gpt-5.5"
      - HYPOTHESIS_LLM_PROVIDER: "openai"
      - HYPOTHESIS_LLM_MODEL: "gpt-5.5"
      - PLANNING_LLM_PROVIDER: "openai"
      - PLANNING_LLM_MODEL: "gpt-5.5"
      - SUBAGENT_LLM_PROVIDER: "openai"
      - SUBAGENT_LLM_MODEL: "gpt-5.5"
      - DEEP_RESEARCH_ORCHESTRATOR_PROVIDER: "openai"
      - DEEP_RESEARCH_ORCHESTRATOR_MODEL: "gpt-5.5"
      - REFLECTION_LLM_PROVIDER: "openai"
      - REFLECTION_LLM_MODEL: "gpt-5.5"
      - DISCOVERY_LLM_PROVIDER: "openai"
      - DISCOVERY_LLM_MODEL: "gpt-5.5"
      - SEARXNG_URL: "https://aubrai-searxng-production.up.railway.app"
      - PRIVATE_CHAT_LLM_PROVIDER: "vita-tinfoil-model"
      - PRIVATE_CHAT_LLM_MODEL: "qwen-opus"
      - PRIVATE_RESEARCH_LLM_PROVIDER: "vita-tinfoil-model"
      - PRIVATE_RESEARCH_LLM_MODEL: "qwen-opus"
      - PRIVATE_HELPER_LLM_PROVIDER: "cerebras"
