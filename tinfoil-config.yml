      - REDIS_URL: "redis://localhost:6379"
      - SEARXNG_URL: "https://aubrai-searxng-production.up.railway.app"
      - LITERATURE_AGENT_LLM_PROVIDER: "cerebras"
      - LITERATURE_AGENT_LLM_MODEL: "gemma-4-31b"
