    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "noeviction"]

  - name: searxng
    image: "ghcr.io/vitadao/aubrai-agentic-searxng:tinfoil-v1.0.70@sha256:14a53f4b9347b700155917348c21ef665143351ac5e9076787dce051f7a01a21"
    registry:
      username: DobrinAlexandru
      password_secret: GHCR_TOKEN

shim:
  upstream-port: 3000
  paths:
    - /
    - /favicon.ico
    - /health
    - /enclave/attestation
    - /api/*
    - /agents/literature/*
    - /agents/analysis/*
    - /deep-research/*
