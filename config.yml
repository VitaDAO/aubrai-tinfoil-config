# Tinfoil Container Configuration — Aubrai
#
# PUBLIC REPO — this file is the attestation anchor.
# Users verify the running enclave against the SHA256 digest pinned below.
#
# DEPLOY:
#   Push a version tag (e.g. v1.0.0) to trigger the build workflow.
#   The workflow pins the image digest here and creates a signed pre-release.
#   Tinfoil detects the new tag and deploys automatically.

cvm-version: "1"
cpus: 8
memory: 32768  # 32 GB — LaTeX/Pandoc compilation is memory-intensive

containers:
  - name: aubrai
    # Image digest is pinned by CI (tinfoil-build.yml).
    # DO NOT edit this line manually — updated automatically on each deploy.
    image: "ghcr.io/vitadao/aubrai-server:tinfoil-v1.0.37@sha256:773f155129952ab3a02e7fd9837990ff6505b6a2a9fe048939ea4a2b8e4ef0ae"
    registry:
      username: DobrinAlexandru
      password_secret: GHCR_TOKEN

    env:
      # Non-sensitive config — safe to commit
      - NODE_ENV=production
      - PORT=3000
      - USE_JOB_QUEUE=false
      - CHARACTER_FILE=characters/aubrai.json
      - STORAGE_PROVIDER=s3
      # Private embeddings via Tinfoil (768-dim nomic-embed-text, HPKE-encrypted)
      - EMBEDDING_PROVIDER=tinfoil
      - TEXT_EMBEDDING_MODEL=nomic-embed-text
      - USE_RERANKING=true
      - MAX_AUTO_ITERATIONS=5
      # Disable LLM fallback — no data leaves to Anthropic/Google on Tinfoil failure
      - ENABLE_LLM_FALLBACK=false
      # Route ALL LLM calls through Tinfoil inference (private, HPKE-encrypted)
      - REPLY_LLM_PROVIDER=tinfoil
      - REPLY_LLM_MODEL=glm-5-1
      - HYP_LLM_PROVIDER=tinfoil
      - HYP_LLM_MODEL=glm-5-1
      - PLANNING_LLM_PROVIDER=tinfoil
      - PLANNING_LLM_MODEL=glm-5-1
      - CONTINUE_RESEARCH_LLM_PROVIDER=tinfoil
      - CONTINUE_RESEARCH_LLM_MODEL=glm-5-1
      - REFLECTION_LLM_PROVIDER=tinfoil
      - REFLECTION_LLM_MODEL=glm-5-1
      - DISCOVERY_LLM_PROVIDER=tinfoil
      - DISCOVERY_LLM_MODEL=glm-5-1
      - PAPER_GEN_LLM_PROVIDER=tinfoil
      - PAPER_GEN_LLM_MODEL=glm-5-1
      - CLARIFICATION_LLM_PROVIDER=tinfoil
      - CLARIFICATION_LLM_MODEL=glm-5-1
      # HPKE public key — attestation anchor so vita app can encrypt to this enclave
      - HPKE_PUBLIC_KEY=pBbUKMAOC20RbFqfbqNcmqUwb8TGUbpxw4jS4OOj+QY=

    secrets:
      # All values below are encrypted — only decryptable inside the enclave.
      # Add each in the Tinfoil Dashboard > Secrets before first deploy.

      # GHCR registry credentials
      - GHCR_TOKEN

      # Tinfoil inference
      - TINFOIL_API_KEY

      # Encryption master key (XChaCha20-Poly1305 for DB/file encryption)
      - ENCRYPTION_MASTER_KEY     # openssl rand -hex 32

      # Auth
      - BIOAGENTS_SECRET          # JWT signing key: openssl rand -hex 32
      - AUTH_MODE                 # 'jwt' for production
      - ALLOWED_ORIGINS           # Comma-separated: https://your-frontend.com

      # Database
      - AUBRAI_SUPABASE_URL
      - AUBRAI_SUPABASE_ANON_KEY
      - AUBRAI_SUPABASE_SERVICE_KEY

      # File storage
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION
      - S3_BUCKET
      - S3_ENDPOINT               # Optional: non-AWS S3 endpoint

      # HPKE key pair — private is sealed, public is the attestation anchor
      - HPKE_PRIVATE_KEY
      - HPKE_PUBLIC_KEY

      # Literature & analysis agents
      - OPENSCHOLAR_API_URL
      - OPENSCHOLAR_API_KEY
      - BIO_LIT_AGENT_API_URL
      - BIO_LIT_AGENT_API_KEY
      - DATA_ANALYSIS_API_URL
      - DATA_ANALYSIS_API_KEY

shim:
  upstream-port: 3000
  paths:
    - /health
    - /api/enclave-key
    - /api/chat
    - /api/deep-research
    - /api/clarification
    - /api/files
    - /api/auth
    - /api/chat-private
    - /api/ws
