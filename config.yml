    registry:
      username: DobrinAlexandru
      password_secret: GHCR_TOKEN
    command: ["python3", "literature-agent/main.py"]
    env:
      - PORT: "8000"
      - REDIS_URL: "redis://localhost:6379"
      - PAPER_SEARCH_MCP_SEARXNG_URL: "http://localhost:8080"
      - SEARXNG_URL: "http://localhost:8080"
      - LITERATURE_AGENT_LLM_MODEL: "glm-5-1"
      - LITERATURE_AGENT_PLANNER_MODEL: "glm-5-1"
      - LITERATURE_AGENT_JOB_TTL_SECONDS: "86400"
      - LITERATURE_AGENT_SYNTHESIS_TIMEOUT_SECONDS: "120"
      - LITERATURE_AGENT_PLANNER_TIMEOUT_SECONDS: "60"
      - LITERATURE_AGENT_DEEP_OUTLINE_TIMEOUT_SECONDS: "60"
